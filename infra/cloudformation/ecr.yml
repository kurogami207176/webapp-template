AWSTemplateFormatVersion: "2010-09-09"
Description: ECR repository for webapp API images

Resources:
  ApiRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: webapp-api
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 20 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 20
                },
                "action": { "type": "expire" }
              }
            ]
          }

Outputs:
  RepositoryUri:
    Description: ECR repository URI
    Value: !GetAtt ApiRepository.RepositoryUri
    Export:
      Name: webapp-ecr-repo-uri

  RepositoryArn:
    Description: ECR repository ARN
    Value: !GetAtt ApiRepository.Arn
    Export:
      Name: webapp-ecr-repo-arn
