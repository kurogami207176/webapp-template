services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - "8001:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory"]

  dynamodb-setup:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for DynamoDB...' &&
        until aws dynamodb list-tables --endpoint-url http://dynamodb:8000 > /dev/null 2>&1; do sleep 1; done &&
        aws dynamodb create-table --endpoint-url http://dynamodb:8000
          --table-name webapp-users
          --key-schema AttributeName=id,KeyType=HASH
          --attribute-definitions AttributeName=id,AttributeType=S AttributeName=email,AttributeType=S
          --global-secondary-indexes '[{\"IndexName\":\"email-index\",\"KeySchema\":[{\"AttributeName\":\"email\",\"KeyType\":\"HASH\"}],\"Projection\":{\"ProjectionType\":\"ALL\"}}]'
          --billing-mode PAY_PER_REQUEST &&
        aws dynamodb create-table --endpoint-url http://dynamodb:8000
          --table-name webapp-sessions
          --key-schema AttributeName=refresh_token,KeyType=HASH
          --attribute-definitions AttributeName=refresh_token,AttributeType=S
          --billing-mode PAY_PER_REQUEST &&
        echo 'Tables created.'
      "

  api:
    build:
      context: ../api
      dockerfile: Dockerfile.dev
    env_file:
      - ../.env
    environment:
      DYNAMODB_ENDPOINT_URL: http://dynamodb:8000
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      USERS_TABLE_NAME: webapp-users
      SESSIONS_TABLE_NAME: webapp-sessions
    ports:
      - "8000:8000"
    volumes:
      - ../api/src:/app/src
    depends_on:
      dynamodb-setup:
        condition: service_completed_successfully

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
