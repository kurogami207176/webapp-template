name: Build & Deploy

on:
  push:
    branches:
      - main          # → production
      - staging       # → staging
    paths:
      - "app/**"
      - "cf/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [staging, production]

# Prevent concurrent deploys to the same environment
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  APP_NAME: webapp-template

jobs:
  # -------------------------------------------------------------------
  # CI — run tests & build Docker image to verify it compiles
  # -------------------------------------------------------------------
  ci:
    name: CI — test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt
        working-directory: app

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=xml
        working-directory: app

      - name: Build Docker image (validate)
        run: docker build -t webapp-template:ci app/

  # -------------------------------------------------------------------
  # Determine target environment
  # -------------------------------------------------------------------
  set-env:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
    steps:
      - id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          else
            echo "environment=production" >> "$GITHUB_OUTPUT"
          fi

  # -------------------------------------------------------------------
  # Deploy
  # -------------------------------------------------------------------
  deploy:
    name: Deploy to ${{ needs.set-env.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [ci, set-env]
    environment: ${{ needs.set-env.outputs.environment }}

    env:
      ENVIRONMENT: ${{ needs.set-env.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      # ---- AWS auth via static credentials ----------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # ---- Deploy ECR stack (idempotent — creates repo on first run) ----
      - name: Deploy ECR stack
        run: |
          aws cloudformation deploy \
            --template-file cf/ecr.yml \
            --stack-name "${APP_NAME}-ecr" \
            --parameter-overrides \
                "AppName=${APP_NAME}" \
                "Environment=${ENVIRONMENT}" \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset

      # ---- ECR login ---------------------------------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---- Resolve ECR URI from account ID + region -------------------
      - name: Resolve ECR URI
        id: ecr
        run: |
          URI="${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${APP_NAME}"
          echo "uri=${URI}" >> "$GITHUB_OUTPUT"

      # ---- Build & push ------------------------------------------------
      - name: Build and push Docker image
        env:
          ECR_URI: ${{ steps.ecr.outputs.uri }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            -t "${ECR_URI}:${IMAGE_TAG}" \
            -t "${ECR_URI}:latest" \
            app/
          docker push "${ECR_URI}:${IMAGE_TAG}"
          docker push "${ECR_URI}:latest"

      # ---- Deploy ECS Express stack (auto-provisions ALB, SGs, scaling) ----
      - name: Deploy ECS CloudFormation stack
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws cloudformation deploy \
            --template-file cf/ecs.yml \
            --stack-name "${APP_NAME}-ecs-${ENVIRONMENT}" \
            --parameter-overrides \
                "AppName=${APP_NAME}" \
                "Environment=${ENVIRONMENT}" \
                "EcrStackName=${APP_NAME}-ecr" \
                "ImageTag=${IMAGE_TAG}" \
            --capabilities CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset

      # ---- Deploy DNS + TLS stack (ACM cert, HTTPS listener, Route53) ---
      - name: Deploy DNS stack
        run: |
          CF_TAGS=$(jq -r '.[] | "\(.Key)=\(.Value)"' cf/tags.json | tr '\n' ' ')
          aws cloudformation deploy \
            --template-file cf/dns.yml \
            --stack-name "${APP_NAME}-dns-${ENVIRONMENT}" \
            --parameter-overrides \
                "AppName=${APP_NAME}" \
                "Environment=${ENVIRONMENT}" \
                "EcsStackName=${APP_NAME}-ecs-${ENVIRONMENT}" \
            --tags ${CF_TAGS} \
            --capabilities CAPABILITY_IAM \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset

      # ---- Smoke test (uses HTTPS URL from DNS stack) -------------------
      - name: Smoke test
        run: |
          APP_URL=$(aws cloudformation describe-stacks \
            --stack-name "${APP_NAME}-dns-${ENVIRONMENT}" \
            --region "${AWS_REGION}" \
            --query 'Stacks[0].Outputs[?OutputKey==`AppUrl`].OutputValue' \
            --output text 2>/dev/null || true)

          if [[ -n "${APP_URL}" ]]; then
            ./bin/smoke-test.sh --url "${APP_URL}"
          else
            ./bin/smoke-test.sh \
              --env "${ENVIRONMENT}" \
              --region "${AWS_REGION}" \
              --app-name "${APP_NAME}"
          fi

      # ---- Print the app URL ------------------------------------------
      - name: Print app URL
        run: |
          APP_URL=$(aws cloudformation describe-stacks \
            --stack-name "${APP_NAME}-dns-${ENVIRONMENT}" \
            --region "${AWS_REGION}" \
            --query 'Stacks[0].Outputs[?OutputKey==`AppUrl`].OutputValue' \
            --output text 2>/dev/null || true)

          if [[ -z "${APP_URL}" ]]; then
            ALB=$(aws cloudformation describe-stacks \
              --stack-name "${APP_NAME}-ecs-${ENVIRONMENT}" \
              --region "${AWS_REGION}" \
              --query 'Stacks[0].Outputs[?OutputKey==`AlbDnsName`].OutputValue' \
              --output text)
            APP_URL="http://${ALB}"
          fi

          echo "### ✅ Deployed to ${ENVIRONMENT}" >> "$GITHUB_STEP_SUMMARY"
          echo "App URL: ${APP_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "Image:   ${{ steps.ecr.outputs.uri }}:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
