name: Build & Deploy

on:
  push:
    branches:
      - main          # → production
      - staging       # → staging
    paths:
      - "app/**"
      - "cf/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [staging, production]

# Prevent concurrent deploys to the same environment
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  APP_NAME: webapp-template

jobs:
  # -------------------------------------------------------------------
  # CI — run tests & build Docker image to verify it compiles
  # -------------------------------------------------------------------
  ci:
    name: CI — test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt
        working-directory: app

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=xml
        working-directory: app

      - name: Build Docker image (validate)
        run: docker build -t webapp-template:ci app/

  # -------------------------------------------------------------------
  # Determine target environment
  # -------------------------------------------------------------------
  set-env:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
    steps:
      - id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          else
            echo "environment=production" >> "$GITHUB_OUTPUT"
          fi

  # -------------------------------------------------------------------
  # Deploy
  # -------------------------------------------------------------------
  deploy:
    name: Deploy to ${{ needs.set-env.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [ci, set-env]
    environment: ${{ needs.set-env.outputs.environment }}

    env:
      ENVIRONMENT: ${{ needs.set-env.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      # ---- AWS auth via static credentials ----------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # ---- ECR login ---------------------------------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---- Resolve ECR URI from account ID + region -------------------
      - name: Resolve ECR URI
        id: ecr
        run: |
          URI="${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${APP_NAME}"
          echo "uri=${URI}" >> "$GITHUB_OUTPUT"

      # ---- Build & push ------------------------------------------------
      - name: Build and push Docker image
        env:
          ECR_URI: ${{ steps.ecr.outputs.uri }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            -t "${ECR_URI}:${IMAGE_TAG}" \
            -t "${ECR_URI}:latest" \
            app/
          docker push "${ECR_URI}:${IMAGE_TAG}"
          docker push "${ECR_URI}:latest"

      # ---- Update ECS CloudFormation stack (registers new task def) ----
      - name: Deploy ECS CloudFormation stack
        env:
          IMAGE_TAG: ${{ github.sha }}
          NETWORK_STACK: ${{ env.APP_NAME }}-network-${{ env.ENVIRONMENT }}
          ECS_STACK: ${{ env.APP_NAME }}-ecs-${{ env.ENVIRONMENT }}
          ECR_STACK: ${{ env.APP_NAME }}-ecr
        run: |
          aws cloudformation deploy \
            --template-file cf/ecs.yml \
            --stack-name "${ECS_STACK}" \
            --parameter-overrides \
                "AppName=${APP_NAME}" \
                "Environment=${ENVIRONMENT}" \
                "NetworkStackName=${NETWORK_STACK}" \
                "EcrStackName=${ECR_STACK}" \
                "ImageTag=${IMAGE_TAG}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset

      # ---- Force new deployment & wait for stability -------------------
      - name: Force new ECS deployment
        env:
          ECS_STACK: ${{ env.APP_NAME }}-ecs-${{ env.ENVIRONMENT }}
        run: |
          CLUSTER=$(aws cloudformation describe-stacks \
            --stack-name "${ECS_STACK}" \
            --region "${AWS_REGION}" \
            --query 'Stacks[0].Outputs[?OutputKey==`ClusterName`].OutputValue' \
            --output text)

          SERVICE=$(aws cloudformation describe-stacks \
            --stack-name "${ECS_STACK}" \
            --region "${AWS_REGION}" \
            --query 'Stacks[0].Outputs[?OutputKey==`ServiceName`].OutputValue' \
            --output text)

          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "${SERVICE}" \
            --force-new-deployment \
            --region "${AWS_REGION}" \
            --output text > /dev/null

          echo "Waiting for service to stabilise…"
          aws ecs wait services-stable \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}" \
            --region "${AWS_REGION}"

      # ---- Print the app URL ------------------------------------------
      - name: Print app URL
        env:
          ECS_STACK: ${{ env.APP_NAME }}-ecs-${{ env.ENVIRONMENT }}
        run: |
          ALB=$(aws cloudformation describe-stacks \
            --stack-name "${ECS_STACK}" \
            --region "${AWS_REGION}" \
            --query 'Stacks[0].Outputs[?OutputKey==`AlbDnsName`].OutputValue' \
            --output text)
          echo "### ✅ Deployed to ${ENVIRONMENT}" >> "$GITHUB_STEP_SUMMARY"
          echo "App URL: http://${ALB}" >> "$GITHUB_STEP_SUMMARY"
          echo "Image:   ${{ steps.ecr.outputs.uri }}:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
