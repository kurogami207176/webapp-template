name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — lint, typecheck & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: webapp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r api/requirements-dev.txt
        working-directory: api

      - name: Lint (ruff)
        run: ruff check src tests
        working-directory: api

      - name: Typecheck (mypy)
        run: mypy src
        working-directory: api

      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          JWT_SECRET: test-secret-that-is-long-enough-32chars
          CORS_ORIGINS: http://localhost:3000
        run: pytest --cov=src --cov-report=xml -v
        working-directory: api

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: api/coverage.xml

      - name: Build Docker image (validate)
        run: docker build -f api/Dockerfile -t webapp-api:ci api/

  web:
    name: Web — typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Typecheck
        run: npm run typecheck
        working-directory: web
