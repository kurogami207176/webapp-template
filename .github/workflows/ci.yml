name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — lint, typecheck & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt
        working-directory: api

      - name: Lint (ruff)
        run: ruff check src tests
        working-directory: api

      - name: Typecheck (mypy)
        run: mypy src
        working-directory: api

      - name: Run tests
        env:
          JWT_SECRET: test-secret-that-is-long-enough-32chars
          CORS_ORIGINS: http://localhost:3000
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
        run: pytest --cov=src --cov-report=xml -v
        working-directory: api

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: api/coverage.xml

      - name: Build Docker image (validate)
        run: docker build -f api/Dockerfile -t webapp-api:ci api/

  web:
    name: Web — typecheck & e2e
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Typecheck
        run: npm run typecheck
        working-directory: web

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: web

      - name: Start services
        run: docker compose -f docker/docker-compose.yml up -d db api web
        env:
          JWT_SECRET: test-secret-that-is-long-enough-32chars
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/webapp_dev

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8000/health && break
            sleep 2
          done

      - name: Run e2e tests
        run: npx playwright test
        working-directory: web
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
