AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ECR repository for webapp-template.
  Creates the registry and lifecycle policy that keeps only the last 10 tagged images.

Parameters:
  AppName:
    Type: String
    Default: webapp-template
    Description: Application name — used as the ECR repository name.

  Environment:
    Type: String
    Default: production
    AllowedValues: [staging, production]
    Description: Deployment environment.

Resources:
  # ---------------------------------------------------------------
  # ECR Repository
  # ---------------------------------------------------------------
  Repository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: !Sub "${AppName}"
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPrefixList": ["v"],
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              },
              {
                "rulePriority": 2,
                "description": "Remove untagged images older than 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: AppName
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  RepositoryUri:
    Description: Full ECR repository URI
    Value: !GetAtt Repository.RepositoryUri
    Export:
      Name: !Sub "${AWS::StackName}-RepositoryUri"

  RepositoryName:
    Description: ECR repository name
    Value: !Ref Repository
    Export:
      Name: !Sub "${AWS::StackName}-RepositoryName"

  RepositoryArn:
    Description: ECR repository ARN
    Value: !GetAtt Repository.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RepositoryArn"
