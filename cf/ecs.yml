AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ECS Express Mode service for webapp-template.
  Automatically provisions the ALB, target group, security groups,
  auto-scaling, and CloudWatch logs — no separate network stack required.
  Depends on the ECR stack (cf/ecr.yml).

Parameters:
  AppName:
    Type: String
    Default: webapp-template

  Environment:
    Type: String
    Default: production
    AllowedValues: [staging, production]

  EcrStackName:
    Type: String
    Default: webapp-template-ecr
    Description: Name of the deployed ECR CloudFormation stack.

  ImageTag:
    Type: String
    Default: latest
    Description: Docker image tag to deploy.

  ContainerPort:
    Type: Number
    Default: 3000

  TaskCpu:
    Type: String
    Default: "256"
    AllowedValues: ["256", "512", "1024", "2048", "4096"]

  TaskMemory:
    Type: String
    Default: "512"
    AllowedValues: ["512", "1024", "2048", "4096", "8192"]

  MinTaskCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 10

  MaxTaskCount:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 10

Resources:
  # ---------------------------------------------------------------
  # IAM — ECS task execution role (pull image, write logs)
  # ---------------------------------------------------------------
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-${Environment}-ecs-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: AppName
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

  # IAM — ECS task role (runtime permissions for your app: SSM, S3, etc.)
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-${Environment}-ecs-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: AppName
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

  # IAM — Infrastructure role (ECS Express manages ALB, SGs, auto-scaling on your behalf)
  InfrastructureRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-${Environment}-ecs-infrastructure-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSInfrastructureRoleforExpressGatewayServices
      Tags:
        - Key: AppName
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------
  # ECS Express Gateway Service
  # Automatically provisions: ECS cluster, task definition, service,
  # ALB, target group, security groups, auto-scaling, CloudWatch logs.
  # ---------------------------------------------------------------
  ExpressService:
    Type: AWS::ECS::ExpressGatewayService
    Properties:
      ServiceName: !Sub "${AppName}-${Environment}"
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      InfrastructureRoleArn: !GetAtt InfrastructureRole.Arn
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      HealthCheckPath: /health
      PrimaryContainer:
        Image: !Sub
          - "${Uri}:${Tag}"
          - Uri:
              Fn::ImportValue: !Sub "${EcrStackName}-RepositoryUri"
            Tag: !Ref ImageTag
        ContainerPort: !Ref ContainerPort
        Environment:
          - Name: PORT
            Value: !Sub "${ContainerPort}"
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: PYTHONDONTWRITEBYTECODE
            Value: "1"
      ScalingTarget:
        MinTaskCount: !Ref MinTaskCount
        MaxTaskCount: !Ref MaxTaskCount
      Tags:
        - Key: AppName
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

Outputs:
  ServiceArn:
    Value: !GetAtt ExpressService.ServiceArn
    Export:
      Name: !Sub "${AWS::StackName}-ServiceArn"

  AlbArn:
    Value: !GetAtt ExpressService.ECSManagedResourceArns.IngressPath.LoadBalancerArn
    Export:
      Name: !Sub "${AWS::StackName}-AlbArn"

  AlbDnsName:
    Value: !GetAtt ExpressService.Endpoint
    Export:
      Name: !Sub "${AWS::StackName}-AlbDnsName"

  TargetGroupArn:
    # First target group in the managed list
    Value: !Select
      - 0
      - !GetAtt ExpressService.ECSManagedResourceArns.IngressPath.TargetGroupArns
    Export:
      Name: !Sub "${AWS::StackName}-TargetGroupArn"

  ListenerArn:
    Value: !GetAtt ExpressService.ECSManagedResourceArns.IngressPath.ListenerArn
    Export:
      Name: !Sub "${AWS::StackName}-ListenerArn"
