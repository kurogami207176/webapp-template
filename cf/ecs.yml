AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ECS Fargate cluster, ALB, task definition, and service for webapp-template.
  Depends on the network stack (cf/network.yml) and ECR stack (cf/ecr.yml).

Parameters:
  AppName:
    Type: String
    Default: webapp-template

  Environment:
    Type: String
    Default: production
    AllowedValues: [staging, production]

  NetworkStackName:
    Type: String
    Default: webapp-template-network
    Description: Name of the deployed network CloudFormation stack.

  EcrStackName:
    Type: String
    Default: webapp-template-ecr
    Description: Name of the deployed ECR CloudFormation stack.

  ImageTag:
    Type: String
    Default: latest
    Description: Docker image tag to deploy.

  ContainerPort:
    Type: Number
    Default: 3000

  TaskCpu:
    Type: String
    Default: "256"
    AllowedValues: ["256", "512", "1024", "2048", "4096"]

  TaskMemory:
    Type: String
    Default: "512"
    AllowedValues: ["512", "1024", "2048", "4096", "8192"]

  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 10

  LogRetentionDays:
    Type: Number
    Default: 30

Resources:
  # ---------------------------------------------------------------
  # CloudWatch Log Group
  # ---------------------------------------------------------------
  LogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub "/ecs/${AppName}-${Environment}"
      RetentionInDays: !Ref LogRetentionDays

  # ---------------------------------------------------------------
  # IAM — ECS task execution role (pull image, write logs)
  # ---------------------------------------------------------------
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-${Environment}-ecs-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: AppName
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

  # IAM — ECS task role (runtime permissions: read SSM, etc.)
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-${Environment}-ecs-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: AppName
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------
  # ECS Cluster
  # ---------------------------------------------------------------
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${AppName}-${Environment}"
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: AppName
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------
  # Task Definition
  # ---------------------------------------------------------------
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${AppName}-${Environment}"
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Sub
            - "${Uri}:${Tag}"
            - Uri:
                Fn::ImportValue: !Sub "${EcrStackName}-RepositoryUri"
              Tag: !Ref ImageTag
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: !Sub "${ContainerPort}"
            - Name: ENVIRONMENT
              Value: !Ref Environment
            - Name: NODE_ENV
              Value: production
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - !Sub "wget -qO- http://localhost:${ContainerPort}/health || exit 1"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 10
          Essential: true

  # ---------------------------------------------------------------
  # Application Load Balancer
  # ---------------------------------------------------------------
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${AppName}-${Environment}-alb"
      Scheme: internet-facing
      Type: application
      Subnets:
        - Fn::ImportValue: !Sub "${NetworkStackName}-PublicSubnet1Id"
        - Fn::ImportValue: !Sub "${NetworkStackName}-PublicSubnet2Id"
      SecurityGroups:
        - Fn::ImportValue: !Sub "${NetworkStackName}-AlbSgId"
      Tags:
        - Key: AppName
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${AppName}-${Environment}-tg"
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: ip
      VpcId:
        Fn::ImportValue: !Sub "${NetworkStackName}-VpcId"
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      Tags:
        - Key: AppName
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ---------------------------------------------------------------
  # ECS Service
  # ---------------------------------------------------------------
  Service:
    Type: AWS::ECS::Service
    DependsOn: Listener
    Properties:
      ServiceName: !Sub "${AppName}-${Environment}"
      Cluster: !Ref Cluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - Fn::ImportValue: !Sub "${NetworkStackName}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${NetworkStackName}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${NetworkStackName}-EcsSgId"
      LoadBalancers:
        - ContainerName: app
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      Tags:
        - Key: AppName
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

Outputs:
  ClusterName:
    Value: !Ref Cluster
    Export:
      Name: !Sub "${AWS::StackName}-ClusterName"

  ServiceName:
    Value: !GetAtt Service.Name
    Export:
      Name: !Sub "${AWS::StackName}-ServiceName"

  AlbDnsName:
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub "${AWS::StackName}-AlbDnsName"

  AlbArn:
    Value: !Ref ALB
    Export:
      Name: !Sub "${AWS::StackName}-AlbArn"

  TaskDefinitionArn:
    Value: !Ref TaskDefinition
    Export:
      Name: !Sub "${AWS::StackName}-TaskDefinitionArn"
