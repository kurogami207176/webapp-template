AWSTemplateFormatVersion: "2010-09-09"
Description: >
  GitHub Actions OIDC provider and deploy role.
  Allows GitHub Actions to authenticate with AWS without long-lived credentials.
  Deploy this ONCE per AWS account before setting up CI/CD.

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub organization or username (e.g. my-org)

  GitHubRepo:
    Type: String
    Description: GitHub repository name (e.g. webapp-template)

  AppName:
    Type: String
    Default: webapp-template

  EcrStackName:
    Type: String
    Default: webapp-template-ecr
    Description: ECR stack name — used to scope ECR push permissions.

Conditions:
  # Only create the OIDC provider once per account; skip if it already exists
  # by importing. This template always creates it — delete manually if duplicate.
  CreateOidcProvider: !Equals ["true", "true"]

Resources:
  # ---------------------------------------------------------------
  # GitHub OIDC Provider (one per AWS account)
  # ---------------------------------------------------------------
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  # ---------------------------------------------------------------
  # Deploy Role
  # ---------------------------------------------------------------
  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-github-deploy-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": sts.amazonaws.com
              StringLike:
                "token.actions.githubusercontent.com:sub":
                  !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: EcrPush
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: GetAuthToken
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Sid: PushImage
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource:
                  Fn::ImportValue: !Sub "${EcrStackName}-RepositoryArn"
        - PolicyName: CloudFormationDeploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CfnDeploy
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:ValidateTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DeleteChangeSet
                Resource: !Sub "arn:aws:cloudformation:*:${AWS::AccountId}:stack/${AppName}-*"
              - Sid: CfnPassRole
                Effect: Allow
                Action: iam:PassRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/${AppName}-*"
        # ECS Express Mode deploys via CloudFormation stack updates only;
        # no direct ecs:UpdateService calls are needed from CI.
      Tags:
        - Key: AppName
          Value: !Ref AppName
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  DeployRoleArn:
    Description: ARN to set as AWS_DEPLOY_ROLE_ARN in GitHub secrets
    Value: !GetAtt GitHubDeployRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-DeployRoleArn"
